services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: salary
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: salary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salary -d salary"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ./server/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
